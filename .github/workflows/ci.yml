name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  bazel-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          module-root: e2e
          bazelisk-cache: true
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}
      - name: Bazel test //:all
        working-directory: e2e
        run: bazel test //:all
